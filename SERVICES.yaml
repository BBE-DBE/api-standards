# SERVICES.yaml — BBE-DBE Service Catalog
#
# Single source of truth for "which services exist in the BBE-DBE ecosystem".
# Every agent MUST consult this file BEFORE proposing or implementing a new
# capability (see PRINCIPLES.md §8 "Reuse-First / Lookup-before-Build").
#
# Schema: each entry under `services:` keyed by short-name with fields:
#   role            foundation | service | frontend | bridge
#   repo            github short ref BBE-DBE/<repo>
#   port            local-loopback TCP port (null if not a network service)
#   openapi_url     where the openapi.yaml is reachable when the service runs
#                   (null if not yet published / not applicable)
#   openapi_path    relative path inside the repo
#   manifest_url    /service-manifest endpoint (see protocols/service-manifest.md)
#   capabilities    coarse list — what an agent can ASK this service to do
#   reuse_priority  lower numbers = MUST be checked first when building
#                   adjacent functionality. 0 = foundation, no alternative.
#   status          prod | rc | dev | skeleton | planned
#   version         current released or active version
#   notes           short free-form
#
# Last verified: 2026-05-02

version: 1
catalog_updated: "2026-05-02"

services:


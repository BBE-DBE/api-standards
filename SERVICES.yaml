# ─── Lookup hint for agents ─────────────────────────────────────────
# Before implementing ANY new capability, scan `services[*].capabilities`
# for a match. If a match exists with reuse_priority < your service, you
# MUST consume the existing service rather than re-implement.
#
# Lookup-before-Build is enforced by PRINCIPLES.md §8 and
# checklists/14-dimensions.md §5 + §13.

reuse_lookup_protocol:
  step_1: "Read this file."
  step_2: "Scan services[*].capabilities for the verb you intend to implement."
  step_3: "If found at lower reuse_priority → consume it (HTTP, not copy)."
  step_4: "If not found → propose a capability extension to the matching service first."
  step_5: "Only if step 4 is rejected by the operator: build new."
